[mod-setting-description]
mqs-locomotive-changes=Acceleration, braking power and speed
mqs-speed-magnitude=For comparison, the rocket fuel speed multiplier is 15% + 4.5% per level.
;At "balanced", each locomotive quality level also gives a bonus of 4.5% (multiplicative with fuel effects). At "significant", a legendary locomotive running on coal is as fast as a normal locomotive running on legendary rocket fuel.
mqs-speed-magnitude-old=Rocket fuel gives 15% + 4.5% per quality. At "Balanced", a legendary locomotive with normal rocket fuel matches a normal locomotive with legendary rocket fuel. At "Significant", a legendary locomotive with coal reaches the same speed.
mqs-fuel-consumption=Only applies if locomotive scaling is set to "hybrid"
mqs-wagon-changes=When speed scaling is set to "0" or locomotive changes are disabled, "Minimal" makes no changes to wagons.
mqs-rocket-changes=Scale rocket launch speed with quality (similar to QualityRockets)
;mqs-roboport-changes=Scale charging pad count with quality
mqs-robot-changes=Scale robot speed and/or cargo capacity. Currently requires manually placing the bots in the world, and lacks any way of converting them back into their vanilla item form.
mqs-mining-drill-changes=Scale mining drill speed and/or area
mqs-platform-hub-changes=Scale inventory size, repair speed and circuit wire distance
mqs-underground-weaving=Underground pipes only connect within the same quality, allowing parallel pipes at different "depths" similar to underground belt weaving.
mqs-change-all=Also apply quality changes to entities added by other mods. Might cause compatibility issues - please report those on the mod page.
mqs-only-vanilla=Don't apply scaling to any mod-added entities. If some mod incompatibility forces you to activate this, I'd appreciate a report on the mod portal (or Github).
mqs-entities-hidden=Set the "hidden" flag on all quality variants of entities, to prevent eg. mining drill variants from appearing in ore tooltips. This prevents selection of quality entity variants on the "from" side in the upgrade planner (and as a filter in the deconstruction planner), so the mod "Upgrade planner toggle entity with pipette" is recommended when enabling this setting.
mqs-quality-in-name=Add a quality icon before the localized names of modified entities (useful when dealing with circuit signals representing quality entities, or when adding those to the left side of the upgrade planner). This is only a visual change and doesn't affect the actual entity names, so it shouldn't cause any compatibility issues.
mqs-blacklist=Comma-separated list of entity names to exclude from quality scaling (both entity creation and runtime replacement). Useful for fixing compatibility issues with specific mods without having to disable scaling for entire categories of entities.
mqs-adjustments-in-tooltip=Adds quality scaling info to the entity description (when hovering over an item or entity), instead of only adding that info to the Factoriopedia page. Makes it easier to compare stats, but might clutter description tooltips, especially for entities with a lot of quality-based changes or with other description-extending mods.

