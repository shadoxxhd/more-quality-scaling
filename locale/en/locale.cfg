[string-mod-setting-description]
;mqs-speed-magnitude-0=no speed scaling
mqs-speed-magnitude-0.05=like solid fuel quality differences
; vanilla 2.1
mqs-speed-magnitude-0.1=Factorio 2.1 default
; legendary locomotive on RF like normal L on leg. RF
mqs-speed-magnitude-0.15=like rocket fuel quality differences
mqs-speed-magnitude-0.25=A legendary locomotive with coal is as fast as a normal locomotive with legendary rocket fuel.
;mqs-speed-magnitude-0.3=9% per quality (old)
mqs-speed-magnitude-0.4=A rare locomotive with coal already breaks even with a normal locomotive with rare rocket fuel, while a legendary locomotive on coal gets a 60% bonus, compared to the 37.5% one of legendary rocket fuel.
;mqs-speed-magnitude-0.5=15% per quality (old)
;mqs-speed-magnitude-0.7=21% per quality
;mqs-speed-magnitude-1.0=30% per quality
mqs-fuel-consumption-inverse=Fuel efficiency increases with the square of quality, so that each level adds 30% "runtime" at max acceleration.
mqs-fuel-consumption-constant=Fuel consumption remains constant while acceleration increases.
mqs-fuel-consumption-speed=Fuel consumption scales with maximum speed.
mqs-fuel-consumption-linear=Fuel consumption scales with acceleration (constant efficiency).
mqs-fuel-consumption-qspeed=Fuel consumption scales quadratically with maximum speed, simulating air resistance and providing a relevant downside of using quality locomotives.
;mqs-wagon-changes-compat=Increase max speed of cargo wagons to support higher quality locomotives, irrespective of wagon quality
mqs-wagon-changes-simple=Enable vanilla scaling of cargo capacity and remove wagon speed preference when set (no effect on vanilla wagons)
;mqs-wagon-changes-full-old=Scale cargo capacity, max speed and braking force with quality
mqs-wagon-changes-full=Enables vanilla capacity scaling (for modded wagons), and uses the custom quality system for scaling braking force.
mqs-agritower-changes-area=Area scaling can cause some graphical issues with the crane arm at legendary quality and above (gaps between crane parts).
mqs-agritower-changes-both=Default scaling of tower speed (30% per level), resulting in scaling proportional to planting area for vanilla qualities, but worse scaling for higher modded qualities.
mqs-agritower-changes-both+=Quadratic scaling turn rate and cubic scaling of arm extension speed. The quadratic factor scales directly with the theoretical plantable area (without rounding). This results in almost identical scaling for vanilla qualities (uncommon gets a 31% bonus, while legendary gets a 200% bonus instead of 150%), but stronger scaling for high qualities (at level 10, 4x bonus is increased to 6x; at level 30 ("singularity" quality with "extreme" scaling from the Mythic Quality mod), a 10x factor is improved to 28.6x, keeping pace with the massive 1369 tile area of an extreme singularity agricultural tower)
mqs-heating-changes-capacity=Scale specific heat and energy transfer
mqs-heating-changes-temp=Scale maximum temperature
mqs-heating-changes-both=Total energy capacity scales quadratically with quality
mqs-entities-hidden-mining drills=Only hide mining drills - this preserves upgrade planner etc. functionality for most entities, but prevents tooltip spam in mining drills.

